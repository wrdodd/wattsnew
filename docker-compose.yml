# WattsNew — self-hosted news reader.
#   worker : curates RSS into /data/feed.json on a schedule
#   web    : Next.js reader, published on WEB_PORT (default 8080)
# Both share one volume. Quick start (builds from source):
#   cp .env.example .env        # set a password
#   docker compose up -d --build   # → http://localhost:8080
#
# To use prebuilt images instead of building, replace the `build:` lines with
# `image: ghcr.io/<owner>/wattsnew-worker:latest` (and -web) and run
# `docker compose up -d`.

services:
  worker:
    build: ./worker
    image: wattsnew-worker:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
    volumes:
      - newsdata:/data

  web:
    build: ./web
    image: wattsnew-web:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
    ports:
      - "${WEB_PORT:-8080}:3000"
    volumes:
      - newsdata:/data
    depends_on:
      - worker

volumes:
  newsdata:
