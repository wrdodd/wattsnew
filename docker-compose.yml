# WattsNew — self-hosted news reader (single container).
#   The one service runs the Next.js reader AND the in-process news curator,
#   which fetches RSS into /data/feed.json on the configured schedule (CRON).
# Quick start (builds from source):
#   cp .env.example .env           # set a password
#   docker compose up -d --build   # → http://localhost:8080
#
# To use the prebuilt image instead of building, replace the `build:` line with
# `image: ghcr.io/<owner>/wattsnew:latest` and run `docker compose up -d`.

services:
  wattsnew:
    build: ./web
    image: wattsnew:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
    ports:
      - "${WEB_PORT:-8080}:3000"
    volumes:
      - newsdata:/data

volumes:
  newsdata:
